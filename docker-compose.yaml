# nginx proxy address - http://172.17.0.1:8080

name: prestashop
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  prestashop:
    image: prestashop/prestashop:latest
    pull_policy: always
    container_name: prestashop-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - prestashop
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:8080:80"
    environment:
      TZ: ${TZ:-America/New_York}
      PS_DOMAIN: ${BASE_HOST_NAME:-localhost}.${BASE_DOMAIN_NAME:-example.com}
      PS_ENABLE_SSL: ${PS_ENABLE_SSL:-0}
      PS_INSTALL_AUTO: ${PS_INSTALL_AUTO:-1}
      PS_DEV_MODE: ${PS_DEV_MODE:-0}
      DB_SERVER: prestashop-db
      DB_PORT: 3306
      DB_NAME: ${DB_CREATE_DATABASE_NAME:-prestashop}
      DB_USER: ${DB_USER_NAME:-prestashop}
      DB_PASSWD: ${DB_USER_PASS:-changeme_db_password}
      ADMIN_MAIL: ${APP_ADMIN_USER:-admin@example.com}
      ADMIN_PASSWD: ${APP_ADMIN_PASS:-changeme_admin_password}
      CONTAINER_NAME: prestashop-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    volumes:
      - ./volumes/data/prestashop:/var/www/html
    depends_on:
      prestashop-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://prestashop-app:80'
      - 'cloudflare.hostname=prestashop.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.prestashop-app.entrypoints=http'
      - 'traefik.http.routers.prestashop-app-secure.tls=true'
      - 'traefik.http.routers.prestashop-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.prestashop-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.prestashop-app.middlewares=prestashop-app-https-redirect'
      - 'traefik.http.routers.prestashop-app-secure.entrypoints=https'
      - 'traefik.http.routers.prestashop-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.prestashop-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.prestashop-app-secure.service=prestashop-app'
      - 'traefik.http.services.prestashop-app.loadbalancer.server.port=80'

  prestashop-db:
    image: mariadb:latest
    pull_policy: always
    container_name: prestashop-db
    restart: always
    logging: *default-logging
    networks:
      - prestashop
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-prestashop}
      MARIADB_USER: ${DB_USER_NAME:-prestashop}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
      CONTAINER_NAME: prestashop-db
    volumes:
      - ./volumes/data/db/mariadb/prestashop:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  prestashop:
    name: prestashop
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
